name = "kmddns"
main = "src/index.ts"
compatibility_date = "2025-03-14"

[[d1_databases]]
binding = "kmddns"
database_name = "kmddns"
database_id = "1ca88f67-af60-4d13-af53-38b6ec36e984"
migrations_dir = "migrations"

[vars]
BASE_DOMAIN = "ddns.kmathers.co.uk"
MAX_SUBDOMAIN_LENGTH = "63"
DEFAULT_TTL = "60"
STALE_DAYS = "30"
ALLOW_PRIVATE_IPS = "false"
WEBHOOK_HOST_ALLOWLIST = ""

[triggers]
crons = ["0 3 * * *"]

# Secrets (set via `wrangler secret put`):
#   CF_API_TOKEN   — Cloudflare API token with Zone:DNS:Edit + Zone:Zone:Read
#   CF_ZONE_ID     — Cloudflare zone ID for your domain
#   ADMIN_SECRET   — Long-lived secret for admin route access
#   RESEND_API_KEY — (optional) Resend API key for stale-record notification emails
